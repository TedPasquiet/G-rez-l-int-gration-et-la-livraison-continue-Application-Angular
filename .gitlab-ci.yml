# =============================================================================
# Front-end (Angular) pipeline.
# Reuses the shared test/release skeleton from the ci-templates project and
# adds the Angular-specific build/docker stages.
# =============================================================================
include:
  - project: 'pasquietted/ci-templates'   # dépôt qui contient ci-template.yml
    ref: main
    file: '/ci-template.yml'

# ---------------------------------------------------------------------------
# Tests: Karma runs headless Chrome, so install Chromium on the Node image.
# test.sh handles npm ci + ng test and writes JUnit XML to test-results/.
# ---------------------------------------------------------------------------
test:
  extends: .test
  image: node:20-bookworm
  before_script:
    - apt-get update && apt-get install -y chromium
    - export CHROME_BIN=$(which chromium)

# ---------------------------------------------------------------------------
# Release: pure Node, so the shared .release job works as-is (no JDK needed).
# ---------------------------------------------------------------------------
release:
  extends: .release

# ---------------------------------------------------------------------------
# Build the production bundle for the tag semantic-release just created.
# ---------------------------------------------------------------------------
build:
  stage: build
  image: node:20-bookworm
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Build the nginx image (multi-stage Dockerfile) and push it to the GitLab
# Container Registry, tagged with the release version and "latest".
# ---------------------------------------------------------------------------
docker:push:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - build
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - docker build -t "$CI_REGISTRY_IMAGE:$VERSION" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$VERSION"
    - docker push "$CI_REGISTRY_IMAGE:latest"
